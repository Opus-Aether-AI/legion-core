name: release-please

# Opens / updates a "Release PR" whenever Conventional Commits land on main.
# Merging it bumps `.claude-plugin/marketplace.json` ($.version), updates
# CHANGELOG.md, tags, and creates a GitHub Release. No npm publish — git tags +
# GitHub Releases only.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
