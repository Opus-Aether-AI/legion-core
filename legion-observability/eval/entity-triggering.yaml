# Entity-level trigger scorecard for legion-core's self-learning loop.
#
# Calibrated to the legion-core entity surface — the 5 legion-* skills. legion-core
# ships no slash commands or sub-agents of its own (domain agents add those), so
# every case here is a skill. Extend with command/agent cases when you build on top.
cases:
  - prompt: "Use the Codex primary routing brain to decide when to call Claude from a Codex CLI session"
    expect_type: skill
    expect: legion-codex-mode
    why: Codex-primary routing brain is the legion-codex-mode skill

  - prompt: "Show Legion telemetry, per-executor cost, latency, spans, doctor, and self-learning hints"
    expect_type: skill
    expect: legion-observability
    why: observability telemetry and self-learning hints belong to the observability skill

  - prompt: "Delegate a scoped task to GPT-5 or Cursor in an isolated worktree and return a verified diff"
    expect_type: skill
    expect: legion-router
    why: scoped model delegation with a verified diff is the router

  - prompt: "Orchestrate the whole goal across models: fan out implementation, cross-verify, then synthesize"
    expect_type: skill
    expect: legion-orchestrate
    why: whole-goal fan-out + cross-verify + synthesize is the orchestrator

  - prompt: "Install and update the marketplace and wire the Codex and Cursor bridges"
    expect_type: skill
    expect: legion-setup
    why: install/update + cross-harness bridges is the setup skill
