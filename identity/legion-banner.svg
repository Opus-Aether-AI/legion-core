<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="legion-core-title legion-core-desc">
  <title id="legion-core-title">Legion Core</title>
  <desc id="legion-core-desc">Legion Core, model-agnostic orchestration for agent systems.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0E14"/>
      <stop offset="56%" stop-color="#07080C"/>
      <stop offset="100%" stop-color="#050509"/>
    </linearGradient>
    <linearGradient id="core-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15151D"/>
      <stop offset="100%" stop-color="#090A10"/>
    </linearGradient>
    <linearGradient id="core-edge" x1="68" y1="58" x2="336" y2="302" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F6BB4E"/>
      <stop offset="48%" stop-color="#7E6CFF"/>
      <stop offset="100%" stop-color="#F0E8D6"/>
    </linearGradient>
    <pattern id="field" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F0E8D6" stroke-opacity="0.026" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1200" height="360" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="360" fill="url(#surface)"/>
    <rect width="1200" height="360" fill="url(#field)"/>
    <path d="M54 300H1146" stroke="#F0E8D6" stroke-opacity="0.07"/>
    <path d="M54 62H1146" stroke="#F0E8D6" stroke-opacity="0.06"/>

    <g transform="translate(64 58)">
      <rect x="0" y="0" width="284" height="244" rx="18" fill="#08090E" stroke="#F0E8D6" stroke-opacity="0.10"/>
      <rect x="24" y="24" width="236" height="196" rx="10" fill="url(#core-face)" stroke="url(#core-edge)" stroke-opacity="0.68"/>

      <g fill="none" stroke-linecap="square" stroke-width="2">
        <path d="M-10 62H58V88H104" stroke="#F6BB4E" stroke-opacity="0.68"/>
        <path d="M-10 102H84V116H104" stroke="#F0E8D6" stroke-opacity="0.30"/>
        <path d="M-10 142H104" stroke="#7E6CFF" stroke-opacity="0.64"/>
