name: publish-package

# Manual escape hatch to (re)publish @opus-aether-ai/legion-core to public npm
# from whatever is currently on the default branch — for a first publish, a
# recovery, or a re-push.
#
# The NORMAL path is automatic: release-please.yml publishes inline when it cuts
# a release (gated on `release_created`). This workflow is dispatch-only because a
# `release: published` event raised by release-please's GITHUB_TOKEN does NOT
# trigger workflows, so a `release:` trigger here would never fire anyway.
#
# This is an additive distribution channel: legion-core is still consumable as a
# Claude Code marketplace (`claude plugin marketplace add Opus-Aether-AI/legion-core`)
# and via a source clone.
#
# Auth: configure NPM_TOKEN with publish rights for the @opus-aether-ai scope.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Version is in sync with the marketplace
        run: |
          set -e
          pkg="$(jq -r '.version' package.json)"
          mkt="$(jq -r '.version' .claude-plugin/marketplace.json)"
          if [ "$pkg" != "$mkt" ]; then
            echo "::error::package.json ($pkg) != marketplace.json ($mkt) — release-please keeps these in lockstep; do not edit by hand"
            exit 1
          fi
          echo "version $pkg in sync"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
