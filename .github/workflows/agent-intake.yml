name: agent-intake

on:
  workflow_call:
    inputs:
      issue_number:
        description: Issue number to process.
        required: true
        type: number
      mode:
        description: Intake mode (`explore` or `implement`).
        required: true
        type: string
      worker:
        description: Legion intake worker (`delegate`, `cursor`, or custom via LEGION_INTAKE_WORKER_BIN).
        required: false
        default: delegate
        type: string
      model:
        description: Optional worker model override.
        required: false
        default: ''
        type: string
      worker_bin:
        description: Optional worker binary/path for custom compatible runners.
        required: false
        default: ''
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  # Queue one intake run at a time so AFK work stays bounded and reviewable.
  group: agent-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Secrets are scoped to the specific steps that need them (NOT job-level), so
    # checkout / setup never see them. The worker itself runs with
    # secrets scrubbed from its env inside legion-intake.sh — the issue body is
    # untrusted, so a prompt injection must not be able to read a token.
    env:
      CODEX_HOME: ${{ runner.temp }}/codex-home
      LEGION_INTAKE_WORKER: ${{ inputs.worker }}
      LEGION_INTAKE_MODEL: ${{ inputs.model }}
      LEGION_INTAKE_WORKER_BIN_INPUT: ${{ inputs.worker_bin }}
    steps:
      # Maintainer setup:
      # 1. Create labels `agent:explore` and `agent:implement`.
      # 2. Default worker is `delegate`, which is backed by Codex today. Prefer
      #    CODEX_AUTH = contents of ~/.codex/auth.json from a machine where
      #    `codex login status` is healthy. As a fallback, set OPENAI_API_KEY.
      # 3. Non-default workers must provide their own runner/auth setup without
      #    exposing provider secrets to the worker environment.
      # 4. If required auth is missing we comment on the issue and exit 0 by design.
      - name: Guard intake auth
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          case "${LEGION_INTAKE_WORKER:-delegate}" in
            delegate)
              if [[ -n "${CODEX_AUTH:-}" || -n "${OPENAI_API_KEY:-}" ]]; then
                echo "configured=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
                --body "intake lane not configured for delegate worker: set CODEX_AUTH or OPENAI_API_KEY, or choose another Legion worker"
              echo "configured=false" >> "$GITHUB_OUTPUT"
              ;;
            cursor|custom|*)
              if [[ "${LEGION_INTAKE_WORKER:-}" == "custom" && -z "${LEGION_INTAKE_WORKER_BIN_INPUT:-}" ]]; then
                gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
                  --body "intake lane not configured for custom worker: pass worker_bin or use the default delegate worker"
                echo "configured=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "configured=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - if: steps.auth.outputs.configured == 'true'
        uses: actions/checkout@v5

      - if: steps.auth.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - if: steps.auth.outputs.configured == 'true'
        name: Install default delegate runtime
        run: |
          set -euo pipefail
          if [[ "${LEGION_INTAKE_WORKER:-delegate}" != "delegate" ]]; then
            echo "Skipping Codex install for Legion worker: ${LEGION_INTAKE_WORKER}"
            exit 0
          fi
          npm install -g @openai/codex
          codex --version

      - if: steps.auth.outputs.configured == 'true'
        name: Configure default delegate auth
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [[ "${LEGION_INTAKE_WORKER:-delegate}" != "delegate" ]]; then
            echo "Skipping Codex auth for Legion worker: ${LEGION_INTAKE_WORKER}"
            exit 0
          fi
          mkdir -p "$CODEX_HOME"
          if [[ -n "${CODEX_AUTH:-}" ]]; then
            printf '%s' "$CODEX_AUTH" > "$CODEX_HOME/auth.json"
          else
            printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key >/dev/null
          fi
          codex login status >/dev/null

      - if: steps.auth.outputs.configured == 'true'
        name: Run intake lane
        # Only GH_TOKEN (for posting/PR) — the worker reads auth from its own
        # local store/auth file. legion-intake.sh scrubs GH_TOKEN from the worker
        # subprocess.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=(
            "${{ inputs.mode }}"
            --issue "${{ inputs.issue_number }}"
            --repo "${{ github.repository }}"
            --worker "${LEGION_INTAKE_WORKER:-delegate}"
          )
          if [[ -n "${LEGION_INTAKE_MODEL:-}" ]]; then
            args+=(--model "$LEGION_INTAKE_MODEL")
          fi
          if [[ -n "${LEGION_INTAKE_WORKER_BIN_INPUT:-}" ]]; then
            args+=(--worker-bin "$LEGION_INTAKE_WORKER_BIN_INPUT")
          fi
          bash legion-router/scripts/legion-intake.sh "${args[@]}"
