name: agent-intake

on:
  workflow_call:
    inputs:
      issue_number:
        description: Issue number to process.
        required: true
        type: number
      mode:
        description: Intake mode (`explore` or `implement`).
        required: true
        type: string
      archetype:
        description: Optional Legion routing archetype override.
        required: false
        type: string
        default: ''
      model:
        description: Optional model override; normally leave empty and let the archetype route.
        required: false
        type: string
        default: ''

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  # Queue one intake run at a time so AFK work stays bounded and reviewable.
  group: agent-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Secrets are scoped to the specific steps that need them (NOT job-level), so
    # checkout / setup / backend install never see them. The agent itself runs with
    # secrets scrubbed from its env inside legion-intake.sh — the issue body is
    # untrusted, so a prompt injection must not be able to read a token.
    env:
      # Current legion-delegate backend uses Codex auth on disk. Keep the path
      # backend-specific while exposing the lane itself as Legion intake.
      CODEX_HOME: ${{ runner.temp }}/legion-intake-agent-home
    steps:
      # Maintainer setup:
      # 1. Create labels `agent:explore` and `agent:implement`.
      # 2. Prefer LEGION_INTAKE_AUTH_JSON = current backend auth JSON. For the
      #    default Codex backend, CODEX_AUTH is still accepted as a compatibility
      #    alias. As a fallback, set OPENAI_API_KEY instead.
      # 3. If neither secret exists we comment on the issue and exit 0 by design.
      - name: Guard intake auth
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEGION_INTAKE_AUTH_JSON: ${{ secrets.LEGION_INTAKE_AUTH_JSON }}
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${LEGION_INTAKE_AUTH_JSON:-}" || -n "${CODEX_AUTH:-}" || -n "${OPENAI_API_KEY:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
            --body "intake lane not configured: set LEGION_INTAKE_AUTH_JSON secret (or CODEX_AUTH for the current Codex backend)"
          echo "configured=false" >> "$GITHUB_OUTPUT"

      - if: steps.auth.outputs.configured == 'true'
        uses: actions/checkout@v5

      - if: steps.auth.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - if: steps.auth.outputs.configured == 'true'
        name: Install Legion intake executor backend
        run: |
          set -euo pipefail
          # Current legion-delegate backend shells out to Codex for GPT executors.
          # Keep this backend detail here instead of naming the whole lane after it.
          npm install -g @openai/codex
          codex --version

      - if: steps.auth.outputs.configured == 'true'
        name: Configure Legion intake executor auth
        env:
          LEGION_INTAKE_AUTH_JSON: ${{ secrets.LEGION_INTAKE_AUTH_JSON }}
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          auth_json="${LEGION_INTAKE_AUTH_JSON:-${CODEX_AUTH:-}}"
          if [[ -n "$auth_json" ]]; then
            printf '%s' "$auth_json" > "$CODEX_HOME/auth.json"
          else
            printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key >/dev/null
          fi
          codex login status >/dev/null

      - if: steps.auth.outputs.configured == 'true'
        name: Run intake lane
        # Only GH_TOKEN (for posting/PR) — the executor reads auth from its home.
        # legion-intake.sh scrubs GH_TOKEN from the agent subprocess.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEGION_INTAKE_ARCHETYPE: ${{ inputs.archetype || vars.LEGION_INTAKE_ARCHETYPE }}
          LEGION_INTAKE_EXPLORE_ARCHETYPE: ${{ vars.LEGION_INTAKE_EXPLORE_ARCHETYPE }}
          LEGION_INTAKE_IMPLEMENT_ARCHETYPE: ${{ vars.LEGION_INTAKE_IMPLEMENT_ARCHETYPE }}
          LEGION_INTAKE_MODEL: ${{ inputs.model || vars.LEGION_INTAKE_MODEL }}
        run: |
          set -euo pipefail
          args=("${{ inputs.mode }}" \
            --issue "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}")
          if [[ -n "${LEGION_INTAKE_ARCHETYPE:-}" ]]; then
            args+=(--archetype "$LEGION_INTAKE_ARCHETYPE")
          fi
          if [[ -n "${LEGION_INTAKE_MODEL:-}" ]]; then
            args+=(--model "$LEGION_INTAKE_MODEL")
          fi
          bash legion-router/scripts/legion-intake.sh "${args[@]}"
