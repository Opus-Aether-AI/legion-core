name: release-please

# Single-workflow release pipeline, matching @opus-aether-ai/pine-transpiler:
#  1. release-please opens or updates a Release PR on pushes to main.
#  2. The Release PR is flagged for GitHub-native auto-merge.
#  3. When that Release PR lands, release-please creates the tag + Release and
#     this same workflow publishes @opus-aether-ai/legion-core to npmjs and
#     GitHub Packages.
#
# The publish step lives in this workflow because GitHub does not trigger
# downstream workflows from tags/releases created by the default GITHUB_TOKEN.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Enable auto-merge on Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          pr_number="$(jq -r '.number // empty' <<<"${RELEASE_PR}")"
          if [ -z "${pr_number}" ]; then
            echo "::error::release-please output did not include a PR number"
            exit 1
          fi
          echo "Enabling auto-merge on Release PR #${pr_number}"
          gh pr merge "${pr_number}" --repo "${REPO}" --auto --squash

  publish:
    name: Publish package
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
      url: https://www.npmjs.com/package/@opus-aether-ai/legion-core
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Node for npmjs.com
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Version is in sync
        run: |
          set -euo pipefail
          tag_version="${{ needs.release-please.outputs.version }}"
          pkg="$(jq -r '.version' package.json)"
          mkt="$(jq -r '.version' .claude-plugin/marketplace.json)"
          if [ "$tag_version" != "$pkg" ]; then
            echo "::error::Tag v${tag_version} does not match package.json ${pkg}"
            exit 1
          fi
          if [ "$pkg" != "$mkt" ]; then
            echo "::error::package.json ($pkg) != marketplace.json ($mkt)"
            exit 1
          fi
          echo "version $pkg in sync"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts --tag latest

      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@opus-aether-ai'
          package-manager-cache: false

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Serve the installer from the release so `releases/latest/download/install.sh`
      # always resolves to the released (immutable) script, not main HEAD.
      - name: Attach installer to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" scripts/install.sh --clobber
