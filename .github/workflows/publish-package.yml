name: publish-package

# Manual escape hatch to (re)publish @opus-aether-ai/legion-core to npmjs and
# GitHub Packages from whatever ref this workflow is run against.
#
# The normal path is automatic: release-please.yml publishes when release-please
# cuts a release (gated on `release_created`). This workflow is dispatch-only for
# dry-runs, recovery, or re-pushes.
#
# This is an additive distribution channel: legion-core is still consumable as a
# Claude Code marketplace (`claude plugin marketplace add Opus-Aether-AI/legion-core`)
# and via a source clone.
#
# Auth: npmjs uses Trusted Publishing / GitHub OIDC. GitHub Packages uses
# GITHUB_TOKEN. Keep release-please.yml as the normal npmjs Trusted Publisher;
# real npm publishes from this workflow are only for recovery cases.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
      url: https://www.npmjs.com/package/@opus-aether-ai/legion-core
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node for npmjs.com
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Version is in sync with the marketplace
        run: |
          set -euo pipefail
          pkg="$(jq -r '.version' package.json)"
          mkt="$(jq -r '.version' .claude-plugin/marketplace.json)"
          if [ "$pkg" != "$mkt" ]; then
            echo "::error::package.json ($pkg) != marketplace.json ($mkt) — release-please keeps these in lockstep; do not edit by hand"
            exit 1
          fi
          echo "version $pkg in sync"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts --tag latest

      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@opus-aether-ai'
          package-manager-cache: false

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
