      <text x="2" y="122" font-size="24" font-weight="600" letter-spacing="0.3" fill="#BDB6CB">model-agnostic orchestration for agent systems</text>
      <path d="M2 154H622" stroke="#F0E8D6" stroke-opacity="0.12"/>

      <g transform="translate(2 196)" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="14" letter-spacing="1.5">
        <text x="0" y="0" fill="#F6BB4E">ROUTER</text>
        <path d="M82 -15V6" stroke="#F0E8D6" stroke-opacity="0.14"/>
        <text x="108" y="0" fill="#F0E8D6">ORCHESTRATE</text>
        <path d="M254 -15V6" stroke="#F0E8D6" stroke-opacity="0.14"/>
        <text x="280" y="0" fill="#7E6CFF">OBSERVABILITY</text>
        <path d="M460 -15V6" stroke="#F0E8D6" stroke-opacity="0.14"/>
        <text x="486" y="0" fill="#F0E8D6">SETUP</text>
