        <path d="M180 88H226V62H294" stroke="#F0E8D6" stroke-opacity="0.30"/>
        <path d="M180 116H294" stroke="#F0E8D6" stroke-opacity="0.30"/>
        <path d="M180 142H294" stroke="#F6BB4E" stroke-opacity="0.68"/>
        <path d="M180 168H226V182H294" stroke="#7E6CFF" stroke-opacity="0.64"/>
        <path d="M180 196H226V222H294" stroke="#F0E8D6" stroke-opacity="0.30"/>
      </g>

      <g fill="#08090E" stroke-width="2">
        <circle cx="58" cy="88" r="4" stroke="#F6BB4E"/>
        <circle cx="104" cy="142" r="4" stroke="#7E6CFF"/>
        <circle cx="226" cy="182" r="4" stroke="#7E6CFF"/>
        <circle cx="226" cy="142" r="4" stroke="#F6BB4E"/>
      </g>

      <rect x="104" y="70" width="76" height="144" rx="6" fill="#0C0D13" stroke="#F0E8D6" stroke-opacity="0.20"/>
