name: agent-intake-trigger

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process.
        required: true
        type: number
      mode:
        description: Which lane to run.
        required: true
        type: choice
        options:
          - explore
          - implement
      worker:
        description: Legion worker to run behind the intake contract.
        required: false
        type: choice
        default: delegate
        options:
          - delegate
          - cursor
          - custom
      model:
        description: Optional worker model override.
        required: false
        type: string
        default: ''
      worker_bin:
        description: Optional worker binary/path for custom compatible runners.
        required: false
        type: string
        default: ''

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  route:
    # Label mapping:
    # - `agent:explore`   -> read-only assessment comment on the issue
    # - `agent:implement` -> workspace-write patch, pushed branch, PR for review
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent:explore' ||
      github.event.label.name == 'agent:implement'
    uses: ./.github/workflows/agent-intake.yml
    with:
      issue_number: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event.label.name == 'agent:implement' && 'implement' || 'explore') }}
      worker: ${{ github.event_name == 'workflow_dispatch' && inputs.worker || 'delegate' }}
      model: ${{ github.event_name == 'workflow_dispatch' && inputs.model || '' }}
      worker_bin: ${{ github.event_name == 'workflow_dispatch' && inputs.worker_bin || '' }}
    secrets: inherit
