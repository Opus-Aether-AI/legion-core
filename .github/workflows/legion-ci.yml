name: legion-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # legion-doctor is the single source-of-truth health check: marketplace schema,
  # plugin sources, SKILL.md frontmatter + descriptions (no block-scalar blanking),
  # MCP server resolvability (npx packages exist / local bins executable), the
  # Codex+Cursor bridge merges, costs.json, telemetry schema. codex + router checks
  # — and any unreachable-registry MCP probe — degrade to warnings, so this gates
  # cleanly in CI (ubuntu-latest ships node + python3) without ChatGPT auth or a
  # running router.
  doctor:
    name: legion-doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Run legion-doctor (hard checks gate; codex/router/registry warn only)
        run: bash legion-observability/scripts/legion-doctor.sh

  # No-spend benchmark gate. Runs the deterministic "harness intelligence"
  # scorecard (skill routing / orchestration routing / validation via the stable
  # suite) plus the corpus integrity controls (scripted-oracle must pass every
  # case, scripted-baseline must fail every case). All of this is deterministic
  # and needs no model spend or CLI auth, so it gates every PR. Live model
  # comparisons stay in the manual bench-live.yml workflow behind run_live=true.
  bench:
    name: bench-no-spend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Harness intelligence scorecard (routing/orchestration/validation)
        run: |
          legion-observability/bin/legion-bench stable \
            --suite stable --repo . --repeat 3 --strict --json > /dev/null
      # Each control asserts BOTH directions of corpus integrity: scripted-oracle
      # passes every case (--strict + required_clean_modes) AND scripted-baseline
      # fails every case (the jq guard — a stub that accidentally passes fails CI).
      - name: Corpus integrity control — heldout-oss-36 (parity floor)
        run: |
          legion-observability/bin/legion-bench corpus \
            --corpus heldout-oss-36 --repo . \
            --mode scripted-baseline --mode scripted-oracle \
            --baseline scripted-baseline --strict --require-reliable --json \
          | jq -e '.summary.modes["scripted-oracle"].metrics.pass_rate == 1
                   and .summary.modes["scripted-baseline"].metrics.pass == 0' > /dev/null
      - name: Corpus integrity control — heldout-oss-hard (discriminating tier)
        run: |
          legion-observability/bin/legion-bench corpus \
            --corpus heldout-oss-hard --repo . \
            --mode scripted-baseline --mode scripted-oracle \
            --baseline scripted-baseline --strict --require-reliable --json \
          | jq -e '.summary.modes["scripted-oracle"].metrics.pass_rate == 1
                   and .summary.modes["scripted-baseline"].metrics.pass == 0' > /dev/null
      # The external aider-polyglot corpus is graded by pytest, whose result is
      # Python-version-sensitive (the corpus was self-filtered against the
      # importer host's Python). Rather than gate execution across CI's Python,
      # validate it STRUCTURALLY here (hermetic) — its oracle-passes/stub-fails
      # integrity is guaranteed by the reproducible importer + self-filter, and
      # the full scripted control is documented for local runs.
      - name: Corpus structural check — aider-polyglot-python (external)
        run: |
          jq -e '
            .schema == "legion.bench.corpus.v1"
            and (.cases | length) >= 30
            and (.source.commit | type == "string" and (. | length) > 0)
            and (.cases | all(. as $c
              | ($c.id | startswith("poly-py-"))
              and (($c.answer_files | length) > 0)
              and (($c.answer_files | keys[0]) as $k | $c.files | has($k))
              and ($c.validators[0].command | index("pytest") != null)))
          ' legion-observability/bench/corpora/aider-polyglot-python.json > /dev/null

  # Secret scan. We run the gitleaks binary directly (not the action) to avoid the
  # org-license requirement gitleaks-action imposes. Scans the working tree; the
  # allowlist in .gitleaks.toml exempts test fixtures/mocks/examples.
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch gitleaks
        run: |
          set -euo pipefail
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
      - name: Scan working tree
        run: ./gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1
