# Legion routing policy — balance work by model strength.
#
#   Opus     orchestrates: plan, decompose, decide, verify, integrate (NOT the bulk coder)
#   GPT-5.5  the Codex workhorse: implementation, tests, refactors, reviews, hard work
#
# Goal: codex (GPT-5.5) does >= [targets].codex_share of delegatable work, measured and
# self-corrected by `legion-share`. Resolved by `legion-route <archetype>`, consumed by
# `legion-delegate --archetype`. This is the single place model selection lives.
#
#   executor          self (Opus inline) | codex (delegate to a GPT model)
#   model             gpt-5.5 | opus
#   sandbox           read-only | workspace-write
#   reasoning_effort  low | medium | high | xhigh
#   fallback          models to try on quota/rate-limit before failing
#
# EFFORT POLICY: codex (GPT-5.5) ALWAYS runs at xhigh — quality over speed; on a
# ChatGPT subscription the marginal cost is flat, so there's no reason to skimp. Opus
# orchestrates at xhigh minimum (dynamic higher if a task needs it). Every archetype
# below is xhigh; legion-delegate also defaults effort to xhigh when none is given.

[targets]
codex_share = 0.5          # floor: >= 50% of delegatable work to codex (the policy below exceeds it)

[defaults]
executor = "self"          # an unclassified task: Opus decides (it should classify into an archetype)
model = "opus"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback = []

# ── Opus orchestrates (self) — judgement, not bulk execution ─────────
[archetypes.orchestrate]
executor = "self"
model = "opus"
reasoning_effort = "xhigh"
note = "Plan / decompose / coordinate / integrate — the orchestration itself stays on Opus."

[archetypes.architecture-decision]
executor = "self"
model = "opus"
reasoning_effort = "xhigh"
note = "MAKING a design/architecture/tradeoff decision — keep on Opus (review of one goes to 5.5)."

[archetypes.deep-reasoning]
executor = "self"
model = "opus"
reasoning_effort = "xhigh"
note = "High-judgement reasoning — keep on Opus, do NOT delegate."

# ── GPT-5.5 — Codex implementation/review path ───────────────────────
[archetypes.implement-feature]
executor = "codex"
model = "gpt-5.5"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback = []
note = "A fully-specced feature slice — the default home for real coding."

# ── Frontend: correctness is VISUAL, so it routes by TASTE, not bulk coding ──
# A rendered UI can't be verified from a diff (the reviewer can't see the pixels),
# so frontend leans on Opus's judgement + GPT-5.5 and
# is verified by SCREENSHOT (browser-patterns visual-regression), not diff-reading.
# Pairs with the `impeccable` skill (shape -> craft -> polish). See
# docs/frontend-workflow.md.
[archetypes.frontend-implement]
executor = "self"
model = "opus"
reasoning_effort = "xhigh"
note = "Layout / component structure / design intent stays on Opus (impeccable shape->craft). Frontend quality is taste, not throughput."

[archetypes.frontend-polish]
executor = "codex"
model = "gpt-5.5"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback = []
note = "The polish / a11y / responsive pass — the strong model (5.5), not the bulk coder."

[archetypes.frontend-review]
executor = "codex"
model = "gpt-5.5"
sandbox = "read-only"
reasoning_effort = "xhigh"
note = "Verify by SCREENSHOT (browser-patterns visual-regression), not by reading the diff. 5.5 signs off."

