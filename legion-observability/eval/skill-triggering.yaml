# legion-eval dataset — does each plugin trigger for the prompts it should?
#
# Calibrated to the legion-core skill surface. A domain
# agent that builds on legion-core should extend this with cases for its own
# plugins. Scored by the lexical proxy in legion-eval.py — a signal, not the model.
#
#   expect      — plugin that should win
#   expect_not  — (optional) plugin that must NOT win (anti-trigger)
#   why         — note for humans
cases:
  - prompt: "Delegate this scoped task to codex and bring back a metered diff"
    expect: legion-router
    why: delegate + codex + metered diff is the router's core

  - prompt: "Show the per-executor cost, success-rate and latency dashboard for legion spans"
    expect: legion-observability
    why: executor cost/latency dashboard + spans is observability

  - prompt: "Run the daily self-learning loop, mine span outcomes, and auto-heal doctor findings into PRs"
    expect: legion-observability
    why: self-learning + heal + doctor live in observability

  - prompt: "Decompose this and fan out the coding across models in parallel, then cross-model verify"
    expect: legion-orchestrate
    why: decompose/fan-out/parallel/cross-model verify is the orchestrator loop

  - prompt: "Run this heavy coding task with Legion using plan and validate commands, then show validation-led learning"
    expect: legion-run
    why: plan/validate heavy-task execution with learning belongs to legion-run

  - prompt: "Install and update the legion marketplace and refresh the cross-harness skills"
    expect: legion-setup
    why: install/update marketplace + cross-harness is the setup skill

  - prompt: "Codex-primary routing brain: decide when to call Claude from a Codex CLI session"
    expect: legion-codex-mode
    why: Codex-primary routing brain is the legion-codex-mode skill

  # ── anti-trigger (must NOT mis-route) ────────────────────────────────
  - prompt: "Show me the telemetry dashboard of cost and latency per model"
    expect: legion-observability
    expect_not: legion-router
    why: a reporting/telemetry ask must not trigger the delegation router
