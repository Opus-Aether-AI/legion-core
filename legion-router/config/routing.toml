# Legion routing policy — balance work by model role.
#
# Concrete model IDs live in models.toml. This file should refer to model_ref
# keys only, so model upgrades do not require sweeping route-policy edits.
#
# Goal: codex does >= [targets].codex_share of delegatable work, measured and
# self-corrected by `legion-share`. Resolved by `legion-route <archetype>`,
# consumed by `legion-delegate --archetype`.
#
#   executor          self (the PRIMARY harness runs it inline) | a registered
#                     executor name in executors.toml (codex | cursor | opencode | claude)
#   model_ref         key in models.toml
#   sandbox           read-only | workspace-write
#   reasoning_effort  low | medium | high | xhigh
#   fallback_refs     model_ref keys to try on quota/rate-limit before failing
#
# EFFORT POLICY: codex ALWAYS runs at xhigh — quality over speed; on a
# subscription the marginal cost is flat, so there's no reason to skimp. The
# primary's orchestration also runs at xhigh minimum. Every archetype below is
# xhigh; legion-delegate also defaults effort to xhigh when none is given.
#
# `self` archetypes below stay with the PRIMARY harness (whoever is driving the
# session, resolved by `legion-route --primary`). `model_ref` on a self archetype
# is the Claude-primary default; a non-Claude primary runs its own model inline.

[targets]
codex_share = 0.5          # floor: >= 50% of delegatable work to codex (the policy below exceeds it)

[defaults]
executor = "self"          # an unclassified task: the primary decides (it should classify into an archetype)
model_ref = "claude_orchestrator"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback_refs = []

# ── Claude orchestrates (self) — judgement, not bulk execution ───────
[archetypes.orchestrate]
executor = "self"
model_ref = "claude_orchestrator"
reasoning_effort = "xhigh"
note = "Plan / decompose / coordinate / integrate — the orchestration itself stays with the primary harness."

[archetypes.architecture-decision]
executor = "self"
model_ref = "claude_orchestrator"
reasoning_effort = "xhigh"
note = "MAKING a design/architecture/tradeoff decision — keep on the primary; review can use the Codex review role."

[archetypes.deep-reasoning]
executor = "self"
model_ref = "claude_orchestrator"
reasoning_effort = "xhigh"
note = "High-judgement reasoning — keep on the primary, do NOT delegate."

# ── Codex implementation path ────────────────────────────────────────
[archetypes.implement-feature]
executor = "codex"
model_ref = "codex_workhorse"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback_refs = []
note = "A fully-specced feature slice — the default home for real coding."

# ── Frontend: correctness is VISUAL, so it routes by TASTE, not bulk coding ──
# A rendered UI can't be verified from a diff (the reviewer can't see the pixels),
# so frontend leans on Claude judgement + Codex review and
# is verified by SCREENSHOT (browser-patterns visual-regression), not diff-reading.
# Pairs with the `impeccable` skill (shape -> craft -> polish). See
# docs/frontend-workflow.md.
[archetypes.frontend-implement]
executor = "self"
model_ref = "claude_orchestrator"
reasoning_effort = "xhigh"
note = "Layout / component structure / design intent stays with the primary (impeccable shape->craft). Frontend quality is taste, not throughput."

[archetypes.frontend-polish]
executor = "codex"
model_ref = "codex_workhorse"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback_refs = []
note = "The polish / a11y / responsive pass uses the configured Codex workhorse."

[archetypes.frontend-review]
executor = "codex"
model_ref = "codex_review"
sandbox = "read-only"
reasoning_effort = "xhigh"
note = "Verify by SCREENSHOT (browser-patterns visual-regression), not by reading the diff. The configured Codex reviewer signs off."

[archetypes.write-tests]
executor = "codex"
model_ref = "codex_workhorse"
sandbox = "workspace-write"
reasoning_effort = "xhigh"
fallback_refs = []
note = "Author unit/integration tests for a described surface."

[archetypes.fix-bug]
