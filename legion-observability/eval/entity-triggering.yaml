# Entity-level trigger scorecard for Legion's self-learning loop.
#
# Plugin routing catches marketplace-level drift. This dataset checks the lower
# surfaces Legion can now learn about directly: slash commands, sub-agents, and
# cross-harness skills.
cases:
  - prompt: "Run the /feature lane for a product slice with acceptance criteria, rollout notes, validation, PR, and review remediation"
    expect_type: command
    expect: feature
    why: feature lane language should attach to the slash command, not only opus-commands

  - prompt: "Perform a high-rigor multi-pass review gate over the PR and rank findings by severity"
    expect_type: command
    expect: review-gate
    why: review gate vocabulary should identify the review-gate command

  - prompt: "Fork this private repo for open sourcing, strip secrets, credentials, and internal references"
    expect_type: agent
    expect: opensource-forker
    why: fork/sanitize/open-source packaging pipeline starts with the forker agent

  - prompt: "Use the monorepo-engineer subagent for Turborepo workspace graph, package filters, turbo.json, and cross-package refactors"
    expect_type: agent
    expect: monorepo-engineer
    why: Turborepo workspace graph work belongs to the monorepo engineer agent

  - prompt: "Use the Codex primary routing brain to decide when to call Claude from a Codex CLI session"
    expect_type: skill
    expect: legion-codex-mode
    why: Codex-primary routing brain is the legion-codex-mode skill

  - prompt: "Show Legion telemetry, per-executor cost, latency, spans, doctor, and self-learning hints"
    expect_type: skill
    expect: legion-observability
    why: observability telemetry and self-learning hints belong to the observability skill
